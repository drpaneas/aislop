name: aislop

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  aislop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Download aislop binary
        env:
          AISLOP_VERSION: v0.1.4
        run: |
          curl -fsSL -o aislop.tar.gz \
            "https://github.com/drpaneas/aislop/releases/download/${AISLOP_VERSION}/aislop-${AISLOP_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf aislop.tar.gz
          chmod +x ./aislop

      - name: Run aislop on PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          if [ -n "${GEMINI_API_KEY:-}" ]; then
            ./aislop "$PR_URL" --comment --llm --llm-provider gemini -v
          else
            echo "GEMINI_API_KEY is not set. Running patterns-only mode."
            ./aislop "$PR_URL" --comment -v
          fi
